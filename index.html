<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Family Quiz Night</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #201B2B;
    --surface: #2B2438;
    --surface-2: #352C44;
    --gold: #F2B705;
    --gold-dim: #B8890A;
    --teal: #3FBF9F;
    --coral: #E2574C;
    --text: #F5F1E8;
    --text-dim: #B8AFC4;
    --border: #43394F;
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(242,183,5,0.10), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(63,191,159,0.08), transparent 45%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }
  .wrap{
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 18px 60px;
    min-height: 100vh;
  }
  h1,h2,h3{
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 8px;
    display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{ content:''; width:16px; height:2px; background:var(--gold); display:inline-block; border-radius:2px;}
  p.sub{ color: var(--text-dim); font-size: 15px; line-height:1.5; margin:0 0 24px;}
  .card{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 16px;
    position: relative;
  }
  .ticket{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    margin-bottom: 20px;
    position: relative;
  }
  .ticket::before, .ticket::after{
    content:'';
    position:absolute;
    width:20px; height:20px;
    background: var(--bg);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
  }
  .ticket::before{ left:-11px; }
  .ticket::after{ right:-11px; }
  input[type=text], input[type=password]{
    width:100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 16px;
    font-family:'Inter',sans-serif;
    margin-bottom: 14px;
  }
  input:focus{ outline:2px solid var(--gold); outline-offset:1px; }
  label.field-label{
    display:block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight:500;
  }
  button{
    font-family:'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 17px;
    border: none;
    border-radius: 14px;
    padding: 15px 20px;
    cursor: pointer;
    width: 100%;
    transition: transform .08s ease;
  }
  button:active{ transform: scale(0.97); }
  .btn-primary{ background: var(--gold); color: #2A1D02; }
  .btn-secondary{ background: var(--surface-2); color: var(--text); border:1px solid var(--border);}
  .btn-danger{ background: transparent; color: var(--coral); border:1px solid var(--coral); }
  .btn-ghost{ background:transparent; color: var(--text-dim); border:1px solid var(--border); font-size:14px; padding:10px 14px;}
  .option-btn{
    display:block;
    width:100%;
    text-align:left;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 16px 16px;
    border-radius: 14px;
    margin-bottom: 12px;
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:16px;
    cursor:pointer;
  }
  .option-btn:active{ background: var(--surface); border-color: var(--gold); }
  .option-btn.selected{ border-color: var(--gold); background: rgba(242,183,5,0.12); }
  .progress-track{
    height:6px; background: var(--surface-2); border-radius:6px; overflow:hidden; margin-bottom:20px;
  }
  .progress-fill{ height:100%; background: var(--gold); border-radius:6px; transition: width .3s ease; }
  .q-image{ width:100%; border-radius:14px; margin-bottom:16px; display:block; max-height:260px; object-fit:cover; }
  .warn-banner{
    position: sticky; top:10px; z-index:20;
    background: var(--coral); color:#fff;
    font-family:'JetBrains Mono',monospace;
    font-size:13px; font-weight:700;
    padding:10px 14px; border-radius:12px;
    margin-bottom:16px; text-align:center;
    display:none;
  }
  .warn-banner.show{ display:block; animation: pop .25s ease; }
  @keyframes pop{ from{ transform:scale(0.92); opacity:0;} to{ transform:scale(1); opacity:1;} }
  .hidden{ display:none !important; }
  .row{ display:flex; gap:10px; }
  .row > *{ flex:1; }
  .qlist-item{
    background: var(--surface-2); border:1px solid var(--border); border-radius:14px;
    padding:14px 16px; margin-bottom:10px;
  }
  .qlist-item .qtext{ font-weight:600; margin-bottom:6px; }
  .qlist-item .qmeta{ font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; }
  .thumb{ width:44px; height:44px; border-radius:8px; object-fit:cover; margin-right:8px; vertical-align:middle; }
  .divider{ border:none; border-top:1px dashed var(--border); margin:20px 0; }
  .score-row{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--surface-2); border:1px solid var(--border);
    border-radius:14px; padding:14px 16px; margin-bottom:10px;
  }
  .score-row .name{ font-weight:600; font-family:'Baloo 2',sans-serif; font-size:16px; }
  .score-row .meta{ font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; margin-top:2px;}
  .score-pill{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px;
    background: var(--surface); border:1px solid var(--gold); color: var(--gold);
    padding:6px 12px; border-radius:20px;
  }
  .medal{ font-size:20px; margin-right:6px; }
  .violation-badge{
    margin-top:10px;
    background: rgba(226,87,76,0.15);
    color: var(--coral);
    border: 1px solid var(--coral);
    font-family:'JetBrains Mono', monospace;
    font-size:12px; font-weight:700;
    padding:6px 10px; border-radius:8px;
    display:inline-block;
  }
  .answer-row{
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:10px 0; border-bottom:1px solid var(--border); font-size:14px;
  }
  .answer-row:last-child{ border-bottom:none; }
  .tag-correct{ color: var(--teal); font-weight:700; }
  .tag-wrong{ color: var(--coral); font-weight:700; }
  .link-btn{ background:none; border:none; color:var(--gold); font-family:'Inter',sans-serif; font-weight:600; font-size:14px; padding:0; width:auto; cursor:pointer;}
  .empty{ text-align:center; padding: 40px 10px; color: var(--text-dim); }
  .empty .big{ font-size:40px; margin-bottom:10px; }
  .footer-note{ text-align:center; font-size:12px; color:var(--text-dim); margin-top:24px; }
  details summary{ cursor:pointer; color:var(--text-dim); font-size:13px; margin-top:6px; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
const QKEY = 'famquiz_questions_v1';
const RKEY = 'famquiz_results_v1';
const PINKEY = 'famquiz_pin_v1';

const app = document.getElementById('app');
let state = { screen: 'loading' };

async function sget(key, fallback){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function sset(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), true); }catch(e){ console.error('storage set failed', e); }
}

function resizeImage(file, maxW){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxW){ h = Math.round(h * (maxW/w)); w = maxW; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function route(){
  const hash = location.hash;
  if(hash.startsWith('#admin')) return 'adminGate';
  return 'home';
}

async function init(){
  state.questions = await sget(QKEY, []);
  state.results = await sget(RKEY, []);
  state.pin = await sget(PINKEY, null);
  state.screen = route();
  render();
}
window.addEventListener('hashchange', ()=>{ state.screen = route(); state.adminOk = false; render(); });

function render(){
  if(state.screen === 'loading'){ app.innerHTML = '<p class="sub">Loading…</p>'; return; }
  if(state.screen === 'home') return renderHome();
  if(state.screen === 'name') return renderName();
  if(state.screen === 'quiz') return renderQuiz();
  if(state.screen === 'done') return renderDone();
  if(state.screen === 'adminGate') return renderAdminGate();
  if(state.screen === 'admin') return renderAdmin();
}

function renderHome(){
  const hasQuestions = state.questions.length > 0;
  const subText = hasQuestions
    ? state.questions.length + ' question' + (state.questions.length===1?'':'s') + ' loaded. Enter your name to begin.'
    : 'The quiz master has not added any questions yet - check back soon.';
  const bodyHtml = hasQuestions
    ? '<div class="ticket"><label class="field-label">Your name <span style="color:var(--coral);">*</span></label><input type="text" id="nameInput" placeholder="e.g. Grandma Rosa" maxlength="40" /><p id="nameError" class="hidden" style="color:var(--coral); font-size:13px; margin:-8px 0 14px;">Enter your name to continue - we need to know who took the quiz.</p><button class="btn-primary" id="startBtn">Start quiz</button></div><p class="footer-note">Stay on this tab once you start - switching away is tracked.</p>'
    : '<div class="card empty"><div class="big">\uD83C\uDF9F\uFE0F</div><p>No questions yet.</p></div>';
  app.innerHTML = `
    <div class="eyebrow">Family quiz night</div>
    <h1 style="font-size:28px;">Think you know your family?</h1>
    <p class="sub">${subText}</p>
    ${bodyHtml}
  `;
  if(hasQuestions){
    const nameInput = document.getElementById('nameInput');
    const nameError = document.getElementById('nameError');
    document.getElementById('startBtn').onclick = ()=>{
      const val = nameInput.value.trim();
      if(!val){
        nameError.classList.remove('hidden');
        nameInput.focus();
        nameInput.style.borderColor = 'var(--coral)';
        return;
      }
      state.playerName = val;
      state.answers = [];
      state.qIndex = 0;
      state.tabSwitches = 0;
      state.screen = 'quiz';
      render();
    };
    nameInput.addEventListener('input', ()=>{
      nameError.classList.add('hidden');
      nameInput.style.borderColor = '';
    });
  }
}

function renderName(){ renderHome(); }

let visibilityHandler = null;
function attachVisibilityTracking(){
  if(visibilityHandler) document.removeEventListener('visibilitychange', visibilityHandler);
  visibilityHandler = ()=>{
    if(document.hidden && state.screen === 'quiz'){
      state.tabSwitches = (state.tabSwitches||0) + 1;
      state.violation = true;
      submitQuiz(true);
    }
  };
  document.addEventListener('visibilitychange', visibilityHandler);
}

function renderQuiz(){
  const q = state.questions[state.qIndex];
  const total = state.questions.length;
  const pct = Math.round((state.qIndex/total)*100);
  app.innerHTML = `
    <div class="warn-banner show" id="warnBanner" style="background: var(--gold); color:#2A1D02;">⚠ Stay on this tab - switching away ends the quiz immediately</div>
    <div class="eyebrow">Question ${state.qIndex+1} of ${total}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    ${q.image ? `<img class="q-image" src="${q.image}" alt="" />` : ''}
    <h2 style="font-size:21px; margin-bottom:18px; line-height:1.3;">${escapeHtml(q.text)}</h2>
    <div id="optsWrap"></div>
  `;
  const optsWrap = document.getElementById('optsWrap');
  q.options.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = ()=>{
      state.answers.push({ qId: q.id, chosenIndex: i, correctIndex: q.correctIndex });
      if(state.qIndex + 1 < total){
        state.qIndex++;
        render();
      }else{
        submitQuiz();
      }
    };
    optsWrap.appendChild(btn);
  });
  attachVisibilityTracking();
}

async function submitQuiz(isViolation){
  if(visibilityHandler) document.removeEventListener('visibilitychange', visibilityHandler);
  let score = 0;
  state.answers.forEach(a=>{ if(a.chosenIndex === a.correctIndex) score++; });
  const result = {
    id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    name: state.playerName,
    answers: state.answers,
    score: score,
    total: state.questions.length,
    answeredCount: state.answers.length,
    tabSwitches: state.tabSwitches || 0,
    violation: !!isViolation,
    submittedAt: Date.now()
  };
  const latest = await sget(RKEY, []);
  latest.push(result);
  await sset(RKEY, latest);
  state.results = latest;
  state.lastViolation = !!isViolation;
  state.screen = 'done';
  render();
}

function renderDone(){
  const wasViolation = state.lastViolation;
  app.innerHTML = wasViolation ? `
    <div class="eyebrow" style="color: var(--coral);">Quiz ended</div>
    <h1 style="font-size:26px;">Quiz ended early, ${escapeHtml(state.playerName)}</h1>
    <p class="sub">You switched away from this tab, so the quiz was submitted automatically with whatever was answered so far.</p>
    <div class="card" style="text-align:center; border-color: var(--coral);">
      <div style="font-size:38px;">⚠</div>
      <p style="color:var(--text-dim); margin-top:8px;">${state.answers.length} of ${state.questions.length} question${state.questions.length===1?'':'s'} answered before the quiz ended</p>
    </div>
    <button class="btn-secondary" id="againBtn">Back to start</button>
  ` : `
    <div class="eyebrow">Submitted</div>
    <h1 style="font-size:26px;">Nice work, ${escapeHtml(state.playerName)}!</h1>
    <p class="sub">Your answers are in. Ask the quiz master when results are revealed.</p>
    <div class="card" style="text-align:center;">
      <div style="font-size:38px;">🎉</div>
      <p style="color:var(--text-dim); margin-top:8px;">${state.answers.length} question${state.answers.length===1?'':'s'} answered</p>
    </div>
    <button class="btn-secondary" id="againBtn">Back to start</button>
  `;
  document.getElementById('againBtn').onclick = ()=>{ state.screen='home'; render(); };
}

function renderAdminGate(){
  const isFirstTime = !state.pin;
  app.innerHTML = `
    <div class="eyebrow">Quiz master</div>
    <h1 style="font-size:24px;">${isFirstTime ? 'Set an admin PIN' : 'Enter admin PIN'}</h1>
    <p class="sub">${isFirstTime ? 'Choose a simple PIN so only you can manage questions and see results.' : 'This keeps your family from peeking at the answer key.'}</p>
    <div class="ticket">
      <input type="password" id="pinInput" placeholder="4+ digit PIN" inputmode="numeric" />
      <button class="btn-primary" id="pinBtn">${isFirstTime ? 'Set PIN & continue' : 'Unlock'}</button>
    </div>
    <button class="link-btn" id="backHome" style="margin-top:14px;">← Back to quiz</button>
  `;
  document.getElementById('backHome').onclick = ()=>{ location.hash=''; };
  document.getElementById('pinBtn').onclick = async ()=>{
    const val = document.getElementById('pinInput').value.trim();
    if(val.length < 4){ alert('PIN should be at least 4 characters.'); return; }
    if(isFirstTime){
      await sset(PINKEY, val);
      state.pin = val;
      state.screen = 'admin';
      render();
    }else{
      if(val === state.pin){ state.screen = 'admin'; render(); }
      else{ alert('Incorrect PIN.'); }
    }
  };
}

let editingImage = null;
function renderAdmin(){
  const q = state.questions;
  const r = state.results;
  app.innerHTML = `
    <div class="eyebrow">Quiz master dashboard</div>
    <h1 style="font-size:24px;">Manage & review</h1>
    <p class="sub">Add questions, then check who got what right once everyone's played.</p>

    <div class="row" style="margin-bottom:20px;">
      <button class="btn-secondary" id="tabQ">Questions (${q.length})</button>
      <button class="btn-secondary" id="tabR">Results (${r.length})</button>
    </div>

    <div id="adminBody"></div>

    <hr class="divider" />
    <button class="btn-ghost" id="lockBtn">Lock admin</button>
  `;
  document.getElementById('tabQ').onclick = ()=>{ state.adminTab='q'; renderAdminBody(); };
  document.getElementById('tabR').onclick = ()=>{ state.adminTab='r'; renderAdminBody(); };
  document.getElementById('lockBtn').onclick = ()=>{ state.screen='adminGate'; render(); };
  state.adminTab = state.adminTab || 'q';
  renderAdminBody();
}

function renderAdminBody(){
  const body = document.getElementById('adminBody');
  if(state.adminTab === 'q'){
    body.innerHTML = `
      <div class="card">
        <h3 style="font-size:16px; margin-bottom:14px;">Add a question</h3>
        <label class="field-label">Question text</label>
        <input type="text" id="qText" placeholder="What was Grandpa's first car?" />
        <label class="field-label">Photo (optional)</label>
        <input type="file" id="qImage" accept="image/*" style="margin-bottom:14px; width:100%;" />
        <div id="imgPreviewWrap"></div>
        <label class="field-label">Options (tap the circle next to the correct one)</label>
        <div id="optionsBuilder"></div>
        <button class="btn-ghost" id="addOptionBtn" style="margin-bottom:14px;">+ Add option</button>
        <button class="btn-primary" id="saveQBtn">Save question</button>
      </div>
      <h3 style="font-size:16px; margin: 22px 0 10px;">All questions</h3>
      <div id="qListWrap"></div>
    `;
    editingImage = null;
    let optionCount = 0;
    let correctIdx = 0;
    const builder = document.getElementById('optionsBuilder');
    function addOptionRow(prefill){
      const idx = optionCount++;
      const row = document.createElement('div');
      row.style.display='flex'; row.style.alignItems='center'; row.style.gap='8px'; row.style.marginBottom='10px';
      row.innerHTML = `
        <input type="radio" name="correctOpt" value="${idx}" ${idx===0?'checked':''} style="width:18px;height:18px; accent-color: var(--gold); flex-shrink:0;" />
        <input type="text" class="optText" placeholder="Option ${idx+1}" value="${prefill||''}" style="margin-bottom:0;" />
      `;
      builder.appendChild(row);
    }
    addOptionRow(); addOptionRow();
    document.getElementById('addOptionBtn').onclick = ()=> addOptionRow();

    document.getElementById('qImage').onchange = async (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      const dataUrl = await resizeImage(file, 800);
      editingImage = dataUrl;
      document.getElementById('imgPreviewWrap').innerHTML = `<img src="${dataUrl}" style="width:100%; border-radius:12px; margin-bottom:14px;" />`;
    };

    document.getElementById('saveQBtn').onclick = async ()=>{
      const text = document.getElementById('qText').value.trim();
      const optionInputs = [...document.querySelectorAll('.optText')].map(i=>i.value.trim());
      const correctRadio = document.querySelector('input[name="correctOpt"]:checked');
      if(!text){ alert('Add a question first.'); return; }
      if(optionInputs.some(o=>!o)){ alert('Fill in all options or remove empty ones.'); return; }
      if(optionInputs.length < 2){ alert('Add at least two options.'); return; }
      const newQ = {
        id: 'q_' + Date.now(),
        text, options: optionInputs,
        correctIndex: parseInt(correctRadio.value,10),
        image: editingImage
      };
      const latest = await sget(QKEY, []);
      latest.push(newQ);
      await sset(QKEY, latest);
      state.questions = latest;
      renderAdminBody();
    };

    renderQList();
  }else{
    renderResults();
  }
}

function renderQList(){
  const wrap = document.getElementById('qListWrap');
  if(state.questions.length === 0){
    wrap.innerHTML = `<div class="empty"><p>No questions yet — add your first one above.</p></div>`;
    return;
  }
  wrap.innerHTML = state.questions.map((q,i)=>`
    <div class="qlist-item">
      <div style="display:flex; align-items:flex-start; justify-content:space-between;">
        <div style="flex:1;">
          ${q.image ? `<img class="thumb" src="${q.image}" />` : ''}
          <span class="qtext">${escapeHtml(q.text)}</span>
          <div class="qmeta">${q.options.length} options · correct: ${escapeHtml(q.options[q.correctIndex])}</div>
        </div>
        <button class="link-btn" data-del="${q.id}" style="color:var(--coral);">Delete</button>
      </div>
    </div>
  `).join('');
  wrap.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm('Delete this question?')) return;
      const id = btn.getAttribute('data-del');
      const latest = (await sget(QKEY, [])).filter(q=>q.id!==id);
      await sset(QKEY, latest);
      state.questions = latest;
      renderAdminBody();
    };
  });
}

function renderResults(){
  const body = document.getElementById('adminBody');
  if(state.results.length === 0){
    body.innerHTML = `<div class="empty"><div class="big">📊</div><p>No submissions yet.</p></div>`;
    return;
  }
  state.resultSort = state.resultSort || 'score';
  state.resultFilter = state.resultFilter || 'all';

  const byTime = [...state.results].sort((a,b)=> a.submittedAt - b.submittedAt);
  const orderMap = {};
  byTime.forEach((r,i)=>{ orderMap[r.id] = i+1; });

  let list = state.resultFilter === 'violations'
    ? state.results.filter(r=>r.violation)
    : state.results;

  const sorted = state.resultSort === 'time'
    ? [...list].sort((a,b)=> a.submittedAt - b.submittedAt)
    : [...list].sort((a,b)=> b.score - a.score);

  const violationCount = state.results.filter(r=>r.violation).length;
  const medals = ['🥇','🥈','🥉'];

  const controlsHtml = '<div class="row" style="margin-bottom:10px;">'
    + '<button class="btn-ghost" id="sortScoreBtn" style="' + (state.resultSort==='score' ? 'border-color: var(--gold); color: var(--gold);' : '') + '">By score</button>'
    + '<button class="btn-ghost" id="sortTimeBtn" style="' + (state.resultSort==='time' ? 'border-color: var(--gold); color: var(--gold);' : '') + '">By time submitted</button>'
    + '</div>'
    + '<div class="row" style="margin-bottom:16px;">'
    + '<button class="btn-ghost" id="filterAllBtn" style="' + (state.resultFilter==='all' ? 'border-color: var(--gold); color: var(--gold);' : '') + '">All (' + state.results.length + ')</button>'
    + '<button class="btn-ghost" id="filterViolBtn" style="' + (state.resultFilter==='violations' ? 'border-color: var(--coral); color: var(--coral);' : 'color: var(--coral); border-color: var(--coral);') + '">Violations only (' + violationCount + ')</button>'
    + '</div>';

  const rowsHtml = sorted.length === 0
    ? '<div class="empty" style="padding:20px;"><p>No results in this view.</p></div>'
    : sorted.map((r,i)=>{
      const medalHtml = (state.resultSort==='score' && medals[i]) ? '<span class="medal">' + medals[i] + '</span>' : '';
      const dateStr = new Date(r.submittedAt).toLocaleString();
      const orderTag = orderMap[r.id] === 1 ? ' · first submitted' : (' · #' + orderMap[r.id] + ' to submit');
      const switchStr = r.tabSwitches ? (' · ' + r.tabSwitches + ' tab switch' + (r.tabSwitches===1?'':'es')) : '';
      const violationBadge = r.violation
        ? '<div class="violation-badge">⚠ Violation - left the tab</div>'
        : '';
      return '<div class="score-row" style="cursor:pointer; flex-direction:column; align-items:stretch;" data-open="' + r.id + '">'
        + '<div style="display:flex; align-items:center; justify-content:space-between; width:100%;">'
        + '<div><div class="name">' + medalHtml + escapeHtml(r.name) + '</div>'
        + '<div class="meta">' + dateStr + orderTag + switchStr + '</div></div>'
        + '<div class="score-pill">' + r.score + '/' + r.total + '</div>'
        + '</div>'
        + violationBadge
        + '</div>';
    }).join('');

  body.innerHTML = `
    ${controlsHtml}
    <div class="card">${rowsHtml}</div>
    <div id="detailWrap"></div>
  `;
  document.getElementById('sortScoreBtn').onclick = ()=>{ state.resultSort='score'; renderResults(); };
  document.getElementById('sortTimeBtn').onclick = ()=>{ state.resultSort='time'; renderResults(); };
  document.getElementById('filterAllBtn').onclick = ()=>{ state.resultFilter='all'; renderResults(); };
  document.getElementById('filterViolBtn').onclick = ()=>{ state.resultFilter='violations'; renderResults(); };
  body.querySelectorAll('[data-open]').forEach(row=>{
    row.onclick = ()=>{
      const id = row.getAttribute('data-open');
      const r = state.results.find(x=>x.id===id);
      renderResultDetail(r);
    };
  });
}

function renderResultDetail(r){
  const wrap = document.getElementById('detailWrap');
  const violationNote = r.violation
    ? '<p style="color:var(--coral); font-size:13px; margin:-4px 0 14px;">Quiz ended automatically after leaving the tab - only ' + r.answeredCount + ' of ' + r.total + ' questions were answered.</p>'
    : '';
  wrap.innerHTML = `
    <div class="card">
      <h3 style="font-size:16px; margin-bottom:12px;">${escapeHtml(r.name)}'s answers</h3>
      ${violationNote}
      ${r.answers.map(a=>{
        const q = state.questions.find(x=>x.id===a.qId);
        if(!q) return '';
        const correct = a.chosenIndex === a.correctIndex;
        return `
          <div class="answer-row">
            <div style="flex:1; padding-right:10px;">
              <div>${escapeHtml(q.text)}</div>
              <div style="color:var(--text-dim); font-size:12px; margin-top:2px;">Answered: ${escapeHtml(q.options[a.chosenIndex])}</div>
            </div>
            <div class="${correct?'tag-correct':'tag-wrong'}">${correct?'Correct':'Wrong'}</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

init();
</script>
</body>
</html>
